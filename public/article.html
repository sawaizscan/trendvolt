<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>!function(){var p=location.pathname,m=p.match(/^\/([\w-]+)\//);if(m&&m[1]!=='article'&&m[1]!=='category'&&m[1]!=='search'&&m[1]!=='admin'){var b=document.createElement('base');b.href='/'+m[1]+'/';document.head.appendChild(b)}}()</script>
  <title id="meta-title">TrendVolt</title>
  <meta name="description" id="meta-description" content="TrendVolt - AI-powered trending content">
  <meta name="keywords" id="meta-keywords" content="trending, news, AI, technology">
  <link rel="canonical" id="meta-canonical" href="/">
  <meta property="og:title" id="og-title" content="TrendVolt">
  <meta property="og:description" id="og-description" content="TrendVolt - AI-powered trending content">
  <meta property="og:type" content="article">
  <meta property="og:url" id="og-url" content="/">
  <meta property="og:image" id="og-image" content="">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" id="twitter-title" content="TrendVolt">
  <meta name="twitter:description" id="twitter-description" content="TrendVolt - AI-powered trending content">
  <meta name="robots" content="index, follow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            trend: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
            surface: { DEFAULT: '#0f172a', light: '#1e293b', lighter: '#334155', card: '#1e293b' },
          }
        }
      }
    }
  </script>
</head>
<body class="bg-white dark:bg-surface text-gray-900 dark:text-gray-100 font-sans antialiased transition-colors duration-200">
  <div id="app">
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-surface/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <a href="/" class="flex items-center space-x-2 group">
            <div class="w-8 h-8 bg-gradient-to-br from-trend-400 to-trend-600 rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">T</span></div>
            <span class="text-xl font-bold bg-gradient-to-r from-trend-400 to-trend-600 bg-clip-text text-transparent">TrendVolt</span>
          </a>
          <div class="flex items-center space-x-3">
            <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-surface-lighter transition-colors" aria-label="Toggle theme">
              <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
              <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="article-page">
      <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-6" id="breadcrumbs">
        <a href="/" class="hover:text-trend-500 transition-colors">Home</a>
        <span>/</span>
        <span id="breadcrumb-category"></span>
        <span>/</span>
        <span class="text-gray-700 dark:text-gray-300 truncate max-w-[200px]" id="breadcrumb-current"></span>
      </div>

      <div class="lg:grid lg:grid-cols-3 lg:gap-12">
        <article class="lg:col-span-2">
          <div class="loading-skeleton h-10 w-3/4 rounded-lg mb-4" id="skeleton-title"></div>
          <div class="loading-skeleton h-5 w-1/2 rounded mb-2" id="skeleton-meta"></div>
          <div class="loading-skeleton h-64 rounded-xl mb-8" id="skeleton-image"></div>
          <div class="loading-skeleton h-4 w-full rounded mb-2" id="skeleton-text1"></div>
          <div class="loading-skeleton h-4 w-full rounded mb-2" id="skeleton-text2"></div>
          <div class="loading-skeleton h-4 w-3/4 rounded mb-8" id="skeleton-text3"></div>

          <div id="article-content" class="hidden">
            <div class="flex flex-wrap items-center gap-3 mb-6">
              <span class="px-3 py-1 bg-trend-500/10 text-trend-500 rounded-full text-sm font-medium" id="article-category"></span>
              <span class="text-sm text-gray-500 dark:text-gray-400" id="article-date"></span>
              <span class="text-sm text-gray-500 dark:text-gray-400" id="article-reading-time"></span>
              <span class="text-sm text-gray-500 dark:text-gray-400" id="article-views"></span>
            </div>

            <h1 class="text-3xl md:text-4xl font-bold mb-6 leading-tight" id="article-title"></h1>

            <div class="prose prose-lg dark:prose-invert max-w-none mb-8" id="article-body"></div>

            <div class="border-t border-gray-200 dark:border-gray-700 pt-6 mb-8">
              <div class="flex flex-wrap gap-2" id="article-tags"></div>
            </div>
          </div>
        </article>

        <aside class="hidden lg:block">
          <div class="sticky top-24 space-y-8">
            <div id="table-of-contents" class="bg-gray-50 dark:bg-surface-light rounded-xl p-6">
              <h3 class="font-semibold mb-4">Table of Contents</h3>
              <nav id="toc-list" class="space-y-2 text-sm"></nav>
            </div>

            <div id="related-articles-sidebar">
              <h3 class="font-semibold mb-4">Related Articles</h3>
              <div class="space-y-4" id="related-list"></div>
            </div>
          </div>
        </aside>
      </div>

      <section id="related-section" class="mt-12 border-t border-gray-200 dark:border-gray-700 pt-8">
        <h2 class="text-2xl font-bold mb-6">Related Articles</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="related-grid"></div>
      </section>
    </div>

    <footer class="bg-gray-900 mt-16">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="text-center text-sm text-gray-500">
          <p>&copy; 2024 TrendVolt. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
