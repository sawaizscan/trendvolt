<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preload" href="css/style.css" as="style">
  <link rel="stylesheet" href="css/style.css">
  <noscript><link rel="stylesheet" href="css/style.css"></noscript>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={
darkMode:"class",
theme:{extend:{fontFamily:{sans:["Inter","system-ui","sans-serif"]},colors:{trend:{50:"#eff6ff",100:"#dbeafe",200:"#bfdbfe",300:"#93c5fd",400:"#60a5fa",500:"#3b82f6",600:"#2563eb",700:"#1d4ed8",800:"#1e40af",900:"#1e3a8a"},surface:{DEFAULT:"#0f172a",light:"#1e293b",lighter:"#334155",card:"#1e293b"}}}}}

        <div class="flex items-center justify-between h-16">
          <a href="/" class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-gradient-to-br from-trend-400 to-trend-600 rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">T</span></div>
            <span class="text-xl font-bold bg-gradient-to-r from-trend-400 to-trend-600 bg-clip-text text-transparent">TrendVolt</span>
          </a>
          <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-surface-lighter transition-colors" aria-label="Toggle theme">
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>

      <div class="flex items-center gap-2 text-sm text-gray-500 mb-6">
        <a href="/" class="hover:text-trend-500">Home</a><span>/</span>
        <span id="breadcrumb-cat" class="text-gray-700 dark:text-gray-300"></span>
      </div>
      <div class="mb-8">
        <h1 class="text-3xl md:text-4xl font-bold" id="category-title"></h1>
        <p class="text-gray-500 dark:text-gray-400 mt-2" id="category-description"></p>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="category-articles"></div>
    </div>

    <footer class="bg-gray-900 mt-16"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12"><div class="text-center text-sm text-gray-500"><p>&copy; 2024 TrendVolt. All rights reserved.</p></div></div></footer>
  </div>
  <script src="js/theme.js"></script>
  <script src="js/app.js"></script>

</html>
