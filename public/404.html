<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrendVolt</title>
  <script>
    (function() {
      var path = location.pathname + location.search;
      var match = path.match(/\/trendvolt\/(.*)/);
      var base = match ? '/trendvolt/' : '/';
      var rest = match ? match[1] : path.replace(/^\//, '');

      if (rest.startsWith('article/')) {
        var slug = rest.replace('article/', '');
        sessionStorage.setItem('tv_route', '/article/' + slug);
        location.href = base + 'article.html';
      } else if (rest.startsWith('category/')) {
        var cat = rest.replace('category/', '');
        sessionStorage.setItem('tv_route', '/category/' + cat);
        location.href = base + 'category.html';
      } else if (rest.startsWith('search')) {
        sessionStorage.setItem('tv_route', '/' + rest);
        location.href = base + 'search.html';
      } else if (rest.startsWith('admin')) {
        location.href = base + 'admin.html';
      } else {
        location.href = base;
      }
    })();
  </script>
</head>
<body></body>
</html>
