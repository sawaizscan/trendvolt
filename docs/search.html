<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>!function(){var p=location.pathname,m=p.match(/^\/([\w-]+)\//);if(m&&m[1]!=='article'&&m[1]!=='category'&&m[1]!=='search'&&m[1]!=='admin'){var b=document.createElement('base');b.href='/'+m[1]+'/';document.head.appendChild(b)}}()</script>
  <title>Search - TrendVolt</title>
  <meta name="description" content="Search trending articles on TrendVolt">
  <meta name="robots" content="index, follow">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{trend:{50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a'},surface:{DEFAULT:'#0f172a',light:'#1e293b',lighter:'#334155',card:'#1e293b'}}}}}</script>
</head>
<body class="bg-white dark:bg-surface text-gray-900 dark:text-gray-100 font-sans antialiased">
  <div id="app">
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-surface/80 backdrop-blur-xl border-b border-gray-200 dark:border-gray-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
          <a href="/" class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-gradient-to-br from-trend-400 to-trend-600 rounded-lg flex items-center justify-center"><span class="text-white font-bold text-sm">T</span></div>
            <span class="text-xl font-bold bg-gradient-to-r from-trend-400 to-trend-600 bg-clip-text text-transparent">TrendVolt</span>
          </a>
          <button id="theme-toggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-surface-lighter transition-colors" aria-label="Toggle theme">
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          </button>
        </div>
      </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
      <h1 class="text-3xl font-bold mb-8">Search Articles</h1>
      <div class="relative mb-8">
        <input type="search" id="search-input" placeholder="Search trending topics, AI news, technology..." autofocus
          class="w-full px-5 py-4 pl-12 rounded-xl bg-gray-100 dark:bg-surface-light border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-trend-500 focus:border-transparent text-lg transition-all">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>
      <div id="search-results" class="space-y-6"></div>
      <div id="search-empty" class="text-center py-12 hidden">
        <svg class="w-16 h-16 mx-auto text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <p class="text-gray-500 dark:text-gray-400 text-lg">Type something to search articles</p>
      </div>
    </div>

    <footer class="bg-gray-900 mt-16"><div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12"><div class="text-center text-sm text-gray-500"><p>&copy; 2024 TrendVolt. All rights reserved.</p></div></div></footer>
  </div>
  <script src="/js/theme.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
